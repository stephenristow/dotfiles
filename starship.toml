"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$time\
$cmd_duration\
$line_break\
$character"""

palette = "ricepaper"

[palettes.ricepaper]
paper = "#F5F4EF"
paper2 = "#FBFAF7"
ink = "#2E2E2E"
muted = "#6B7467"
sage = "#7A9B76"
mist = "#7EA6C2"
rose = "#B86F7B"
gold = "#B89B5E"

[os]
disabled = false
style = "fg:muted"
format = "[$symbol ]($style)"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "fg:ink"
style_root = "fg:rose"
format = '[$user]($style) '

[directory]
style = "fg:sage"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "fg:mist"
format = 'on [$symbol $branch]($style) '

[git_status]
style = "fg:rose"
format = '[$all_status$ahead_behind]($style) '

[nodejs]
symbol = ""
style = "fg:sage"
format = '[$symbol$version]($style) '

[c]
symbol = " "
style = "fg:gold"
format = '[$symbol$version]($style) '

[rust]
symbol = ""
style = "fg:gold"
format = '[$symbol$version]($style) '

[golang]
symbol = ""
style = "fg:gold"
format = '[$symbol$version]($style) '

[php]
symbol = ""
style = "fg:mist"
format = '[$symbol$version]($style) '

[java]
symbol = " "
style = "fg:rose"
format = '[$symbol$version]($style) '

[kotlin]
symbol = ""
style = "fg:sage"
format = '[$symbol$version]($style) '

[haskell]
symbol = ""
style = "fg:sage"
format = '[$symbol$version]($style) '

[python]
symbol = ""
style = "fg:sage"
format = '[$symbol$version]($style) '

[docker_context]
symbol = ""
style = "fg:mist"
format = '[$symbol$version]($style) '

[conda]
symbol = "  "
style = "fg:sage"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = '[  $time ]($style)'

[cmd_duration]
show_milliseconds = true
min_time = 500
style = "fg:muted"
format = " in $duration "
show_notifications = true

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](fg:sage)'
error_symbol = '[❯](fg:rose)'
vimcmd_symbol = '[❮](fg:sage)'
vimcmd_replace_one_symbol = '[❮](fg:mist)'
vimcmd_replace_symbol = '[❮](fg:mist)'
vimcmd_visual_symbol = '[❮](fg:gold)'
