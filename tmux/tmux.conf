# True color support

set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty*:RGB"

set -g base-index 1
set -g pane-base-index 1

set-option -g prefix C-b
set-option -g prefix2 none

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode

# resizing windows
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize 
bind -r m resize-pane -Z

# mouse support
set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

bind-key -r f run-shell "tmux new ~/scripts/tmux-sessionizer"
bind-key n command-prompt "new-session -s '%%'"

unbind -T copy-mode-vi MouseDragEnd1Pane

# ricepaper tmux theme
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#E8E6DE, fg=#2E2E2E"
set -g status-left-length 60
set -g status-right-length 60

set -g message-style "bg=#D8E3D2,fg=#2E2E2E"
set -g mode-style "bg=#D8E3D2,fg=#2E2E2E"

set -g pane-border-style "fg=#D8D4C8"
set -g pane-active-border-style "fg=#7A9B76"

set -g window-status-style "bg=#E8E6DE,fg=#6B7467"
set -g window-status-current-style "bg=#D8E3D2,fg=#2E2E2E,bold"
set -g window-status-activity-style "bg=#E8E6DE,fg=#7EA6C2"

set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g status-left "#[fg=#7A9B76,bold]#{session_name} #[fg=#6B7467]| "
set -g status-right "#[fg=#6B7467]%Y-%m-%d #[fg=#7EA6C2]%H:%M "


# tmux plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "christoomey/vim-tmux-navigator"

set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'
run '~/.config/tmux/.tmux/plugins/tpm/tpm'
